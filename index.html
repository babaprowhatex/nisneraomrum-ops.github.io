<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Müzik</title>

<style>
body{margin:0;overflow:hidden;font-family:Arial;color:white;}

.bg{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(.8);
}

.player{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:350px;
padding:25px;
border-radius:30px;

background:rgba(255,255,255,0.03);
backdrop-filter:blur(30px);

text-align:center;
}

.cover{
width:180px;
height:180px;
border-radius:20px;
}

button{
padding:12px;
margin:5px;
border:none;
border-radius:10px;
background:pink;
color:white;
}

</style>
</head>

<body>

<img src="foto.jpg" class="bg">

<div class="player">
<img src="cover1.jpg" class="cover">
<h2>Başa Sar</h2>

<button onclick="audio.play()">▶</button>
<button onclick="audio.pause()">⏸</button>
<button onclick="next()">⏭</button>
</div>

<audio id="audio" src="sarki1.mp3"></audio>

<script>
function next(){
audio.src="sarki2.mp3";
audio.play();
}
</script>

</body>
</html>

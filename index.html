<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Müzik</title>
<style>
body{margin:0;overflow:hidden;font-family:Arial;color:white;}
.bg{position:fixed;width:100%;height:100%;object-fit:cover;filter:brightness(0.5);}
.player{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
background:rgba(0,0,0,0.6);padding:30px;border-radius:20px;text-align:center;}
.cover{width:180px;height:180px;border-radius:20px;margin-bottom:10px;}
button{padding:10px;margin:5px;border:none;border-radius:10px;background:hotpink;color:white;}
</style>
</head>
<body>

<img src="foto.jpg" class="bg">

<div class="player">
<img id="cover" class="cover" src="cover1.jpg">
<h2 id="songName">Başa Sar</h2>
<button onclick="play()">▶️</button>
<button onclick="pause()">⏸️</button>
<button onclick="next()">⏭️</button>
</div>

<audio id="audio"></audio>

<script>
const songs=[
{name:"Başa Sar",file:"sarki1.mp3",cover:"cover1.jpg"},
{name:"Küçük Bir Yol",file:"sarki2.mp3",cover:"cover2.jpg"}
];
let i=0;
const a=document.getElementById("audio");
const n=document.getElementById("songName");
const c=document.getElementById("cover");

function load(){a.src=songs[i].file;n.innerText=songs[i].name;c.src=songs[i].cover;}
function play(){a.play();}
function pause(){a.pause();}
function next(){i=(i+1)%songs.length;load();a.play();}

load();
</script>

</body>
</html>
